<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>地球电台 — 移动端 UI 设计稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #eee; font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  /* Smooth scrubber/range fallback */
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="src/shared.jsx"></script>
<script type="text/babel" src="src/glass-mobile.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <div style={{ display: 'flex', gap: 40, justifyContent: 'center', padding: 40 }}>
        <div>
          <h3 style={{ textAlign: 'center', color: '#fff', fontFamily: 'Inter, sans-serif' }}>iOS</h3>
          <GlassIOS />
        </div>
        <div>
          <h3 style={{ textAlign: 'center', color: '#fff', fontFamily: 'Inter, sans-serif' }}>Android</h3>
          <GlassAndroid />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
